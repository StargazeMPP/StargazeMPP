[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.27"
optimizer = true
optimizer_runs = 200
via_ir = true
remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/forge-std/src/",
]
fs_permissions = [{ access = "read-write", path = "./" }]

[profile.ci]
fuzz = { runs = 1000 }
invariant = { runs = 256, depth = 64 }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"
quote_style = "double"
number_underscore = "thousands"

[rpc_endpoints]
tempo_testnet = "${TEMPO_TESTNET_RPC}"
tempo_mainnet = "${TEMPO_MAINNET_RPC}"

[etherscan]
# Filled in when Tempo's verification service ships
