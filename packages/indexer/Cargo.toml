[package]
name = "stargaze-indexer"
version = "0.0.0"
description = "Sub-50ms-lag Solana indexer for StargazeAnchor events and x402 USDC receipts."
edition = "2021"
license = "Apache-2.0"

[lib]
name = "stargaze_indexer"
path = "src/lib.rs"

[[bin]]
name = "stargaze-indexer"
path = "src/main.rs"

[dependencies]
anyhow = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "signal", "time"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
futures = "0.3"
dotenvy = "0.15"
yellowstone-grpc-client = "13.1"
yellowstone-grpc-proto = "12.3"
base64 = "0.22"
hex = "0.4"
borsh = { version = "1", features = ["derive"] }
sha2 = "0.10"
bs58 = "0.5"
sqlx = { version = "0.8", features = ["postgres", "runtime-tokio-rustls", "chrono", "macros"] }
chrono = { version = "0.4", features = ["serde"] }
async-trait = "0.1"

[dev-dependencies]
borsh = { version = "1", features = ["derive"] }

[profile.release]
lto = "fat"
codegen-units = 1
opt-level = 3
