[package]
name = "stargaze_anchor_tests"
version = "0.0.0"
edition = "2021"
publish = false

[lib]
path = "src/lib.rs"

[dependencies]
anchor-lang = "0.31.1"
anchor-spl = { version = "0.31.1", default-features = false, features = ["token", "associated_token"] }
litesvm = "0.7"
solana-sdk = "=2.3.1"
solana-program = "=2.3.0"
stargaze_anchor = { path = "../programs/stargaze_anchor", features = ["no-entrypoint"] }
base64 = "0.22"
spl-token = { version = "7", features = ["no-entrypoint"] }
spl-associated-token-account = { version = "6", features = ["no-entrypoint"] }

[dev-dependencies]
stargaze-events = { path = "../../stargaze-events" }
