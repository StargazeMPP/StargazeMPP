[package]
name = "vault_verifier_geofence"
version = "0.0.0"
description = "On-chain Groth16 verifier for the geofence vault circuit (N=32, 4 public signals)."
edition = "2021"
license = "Apache-2.0"

[lib]
crate-type = ["cdylib", "lib"]
name = "vault_verifier_geofence"

[features]
default = []
cpi = ["no-entrypoint"]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
idl-build = ["anchor-lang/idl-build"]

[dependencies]
anchor-lang = "0.31.1"
vault-verifier-core = { path = "../../crates/vault-verifier-core" }
