[package]
name = "vault_verifier_aggregate_sum"
version = "0.0.0"
description = "On-chain Groth16 verifier for the aggregate_sum vault circuit (N=8)."
edition = "2021"
license = "Apache-2.0"

[lib]
crate-type = ["cdylib", "lib"]
name = "vault_verifier_aggregate_sum"

[features]
default = []
cpi = ["no-entrypoint"]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
idl-build = ["anchor-lang/idl-build"]

[dependencies]
anchor-lang = "0.31.1"
vault-verifier-core = { path = "../../crates/vault-verifier-core" }
